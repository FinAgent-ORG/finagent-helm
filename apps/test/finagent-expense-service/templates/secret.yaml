---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/instance: {{ .Values.name }}
    app.kubernetes.io/component: expense
    app.kubernetes.io/part-of: finagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  MYSQL_USER: "finagent_expense_user"
  MYSQL_PASSWORD: "change-me-expense-db-password"
  MYSQL_ADMIN_USER: "root"
  MYSQL_ADMIN_PASSWORD: "change-me-shared-root-password"
  JWT_SECRET_KEY: "change-me-shared-jwt-secret"
