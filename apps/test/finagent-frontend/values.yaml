name: finagent-frontend
namespace: finagent-apps
replicaCount: 1
image:
  repository: ghcr.io/finagent-org/finagent-frontend
  tag: latest
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
service:
  name: frontend-service
  type: ClusterIP
  port: 8080
route:
  enabled: true
  gatewayName: finagent-gateway
  gatewayNamespace: finagent-gateway-ns
  hostnames:
    - finagent.example.com
  pathPrefix: /
config:
  APP_MODE: test
nginx:
  resolver: kube-dns.kube-system.svc.cluster.local
  upstreams:
    auth:
      host: auth-service.finagent-apps.svc.cluster.local
      port: 8001
    expense:
      host: expense-service.finagent-apps.svc.cluster.local
      port: 8002
    insights:
      host: insights-service.finagent-apps.svc.cluster.local
      port: 8003
    chat:
      host: chat-service.finagent-apps.svc.cluster.local
      port: 8004
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
