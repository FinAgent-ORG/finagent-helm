apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finagent-mysql-test
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://github.com/FinAgent-ORG/finagent-helm.git
    targetRevision: HEAD
    path: infra/mysql
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: finagent-dbs-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
