{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Values.httpRoute.namespace }}
  labels:
    app.kubernetes.io/part-of: finagent
    app.kubernetes.io/component: keycloak
    shared-gateway: "true"
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: {{ .Values.httpRoute.path.type }}
            value: {{ .Values.httpRoute.path.value | quote }}
      backendRefs:
        - name: {{ .Values.httpRoute.backend.name }}
          port: {{ .Values.httpRoute.backend.port }}
{{- end }}
