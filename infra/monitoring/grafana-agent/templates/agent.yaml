apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: grafana-agent
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: grafana-agent
  template:
    metadata:
      labels:
        app: grafana-agent
    spec:
      serviceAccountName: default

      containers:
        - name: grafana-agent
          image: grafana/agent:v0.40.3
          args:
            - "-config.file=/etc/agent/agent.yaml"

          volumeMounts:
            - name: config
              mountPath: /etc/agent

            - name: varlog
              mountPath: /var/log

            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers

            - name: positions
              mountPath: /var/lib/agent

      volumes:
        - name: config
          configMap:
            name: grafana-agent-config

        - name: varlog
          hostPath:
            path: /var/log

        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

        - name: positions
          hostPath:
            path: /var/lib/agent