loki:
  loki:   
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      filesystem:
        directory: /var/loki/chunks

    compactor:
      working_directory: /var/loki/compactor

    limits_config:
      retention_period: 168h

  deploymentMode: Distributed

  global:
    storageClass: finagent-nfs

  # components (keep same)
  backend:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 10Gi

  write:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 10Gi

  read:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 10Gi

  ingester:
    enabled: true
    replicas: 1
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 20Gi

  compactor:
    enabled: true
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 10Gi

  indexGateway:
    enabled: true
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes: [ReadWriteMany]
      size: 10Gi

  distributor:
    enabled: true

  querier:
    enabled: true

  queryFrontend:
    enabled: true

  queryScheduler:
    enabled: true

  singleBinary:
    enabled: false

  gateway:
    enabled: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
