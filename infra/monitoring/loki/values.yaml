loki:
  loki:   
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      filesystem:
        directory: /var/loki/chunks

    compactor:
      working_directory: /var/loki/compactor

    limits_config:
      retention_period: 168h

  global:
    storageClass: finagent-nfs

  backend:
    replicas: 0

  write:
    replicas: 0

  read:
    replicas: 0

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: finagent-nfs
      accessModes:
        - ReadWriteMany
      size: 20Gi

  gateway:
    enabled: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  monitoring:
    dashboards:
      enabled: false
    rules:
      enabled: false
    serviceMonitor:
      enabled: false
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
