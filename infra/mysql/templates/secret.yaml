---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/instance: {{ .Values.name }}
    app.kubernetes.io/component: mysql
    app.kubernetes.io/part-of: finagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-shared-root-password"
  AUTH_MYSQL_DATABASE: "finagent_auth"
  AUTH_MYSQL_USER: "finagent_auth_user"
  AUTH_MYSQL_PASSWORD: "change-me-auth-db-password"
  EXPENSE_MYSQL_DATABASE: "finagent_expense"
  EXPENSE_MYSQL_USER: "finagent_expense_user"
  EXPENSE_MYSQL_PASSWORD: "change-me-expense-db-password"
