fullnameOverride: keycloak

global:
  defaultStorageClass: finagent-nfs

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: 26.3.3-debian-12-r0

auth:
  adminUser: admin
  adminPassword: "ChangeMe-Admin-Password-Immediately"

production: true
proxyHeaders: xforwarded
hostnameStrict: true
httpEnabled: true

cache:
  enabled: false

service:
  type: ClusterIP
  http:
    enabled: true

ingress:
  enabled: false

tls:
  enabled: false

replicaCount: 1

resourcesPreset: none
resources:
  requests:
    cpu: 500m
    memory: 1024Mi
  limits:
    cpu: 1000m
    memory: 1536Mi

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

livenessProbe:
  enabled: true
  initialDelaySeconds: 180
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

extraEnvVars:
  - name: KC_HOSTNAME
    value: https://keycloak.myfinagent.online
  - name: KC_HOSTNAME_URL
    value: https://keycloak.myfinagent.online
  - name: KC_HOSTNAME_STRICT
    value: "true"
  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_PROXY_HEADERS
    value: xforwarded

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r0
  auth:
    postgresPassword: "ChangeMe-Postgres-Admin-Password-Immediately"
    username: bn_keycloak
    password: "ChangeMe-Keycloak-DB-Password-Immediately"
    database: bitnami_keycloak
  primary:
    persistence:
      enabled: true
      storageClass: finagent-nfs
      size: 8Gi
